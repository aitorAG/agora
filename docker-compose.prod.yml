name: agora-prod

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agora}
      POSTGRES_USER: ${POSTGRES_USER:-agora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - agora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agora_user} -d ${POSTGRES_DB:-agora}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - agora_net
      - agora_edge

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.runtime
    environment:
      AGORA_DEPLOY_TARGET: ${AGORA_DEPLOY_TARGET:-vps}
      AGORA_RUNTIME_CONTEXT: docker
      INTERFACE_MODE: api
      UI_TEST: "true"
      AGORA_API_HOST: 0.0.0.0
      AGORA_API_PORT: 8000
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_ENDPOINT: http://telemetry:8081/v1/events
    security_opt:
      - no-new-privileges:true
    networks:
      - agora_net
      - agora_edge

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      engine:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - agora_net
      - agora_edge

volumes:
  agora_pg_data:
    driver: local

networks:
  agora_net:
    driver: bridge
  agora_edge:
    name: agora_edge
    external: true
