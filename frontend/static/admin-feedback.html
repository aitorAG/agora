<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Feedback</title>
  <style>
    :root {
      --bg: #dccdb7;
      --surface: rgba(249, 242, 230, 0.92);
      --surface-2: #f3e8d7;
      --border: #c5ab84;
      --text: #2e2012;
      --muted: #715e47;
      --accent: #b86732;
      --accent-2: #d69a49;
      --danger: #af4f43;
      --shadow: 0 22px 48px rgba(81, 57, 28, 0.16);
    }

    body.theme-dark {
      --bg: #403631;
      --surface: rgba(94, 80, 71, 0.92);
      --surface-2: #6b5b51;
      --border: #9b7f68;
      --text: #f3e7d6;
      --muted: #d7c0a6;
      --accent: #d38c4f;
      --accent-2: #c2a165;
      --danger: #cf7768;
      --shadow: 0 24px 54px rgba(14, 10, 8, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 8%, rgba(214, 154, 73, 0.22) 0%, transparent 30%),
        radial-gradient(circle at 88% 0%, rgba(108, 137, 129, 0.18) 0%, transparent 24%),
        var(--bg);
      min-height: 100vh;
    }

    .page {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
    }

    .top {
      position: sticky;
      top: 0.75rem;
      z-index: 20;
      background: linear-gradient(180deg, rgba(247, 239, 226, 0.9), rgba(241, 231, 214, 0.9));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 0.9rem;
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }

    .actions {
      display: flex;
      gap: 0.45rem;
      align-items: center;
    }

    .theme-toggle {
      width: 2.45rem;
      height: 2.45rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 249, 241, 0.74);
      color: var(--text);
      cursor: pointer;
    }

    .theme-toggle:hover {
      background: rgba(255, 250, 244, 0.94);
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.48rem 0.78rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border: none;
      color: var(--text);
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 0.84rem;
      min-height: 1.2rem;
    }

    .status.error {
      color: var(--danger);
    }

    .list {
      display: grid;
      gap: 0.65rem;
      align-content: start;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
      padding: 0.8rem;
      box-shadow: var(--shadow);
    }

    .feedback-text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 1rem;
      color: var(--text);
    }

    .meta {
      margin-top: 0.55rem;
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 1rem;
      color: var(--muted);
      background: rgba(255, 249, 241, 0.72);
    }

    body.theme-dark .top {
      background: linear-gradient(180deg, rgba(88, 75, 67, 0.92), rgba(74, 64, 57, 0.94));
    }

    body.theme-dark .theme-toggle {
      background: rgba(117, 99, 88, 0.76);
    }

    body.theme-dark .theme-toggle:hover {
      background: rgba(129, 110, 98, 0.92);
    }

    body.theme-dark .empty {
      background: rgba(112, 95, 85, 0.82);
    }
  </style>
</head>
<body class="theme-light">
  <main class="page">
    <section class="top">
      <h1>Feedback de usuarios</h1>
      <div class="actions">
        <button type="button" id="btn-theme-toggle" class="theme-toggle" aria-label="Activar modo oscuro" title="Cambiar tema">
          <span id="theme-toggle-icon" aria-hidden="true">☀</span>
        </button>
        <button type="button" id="btn-back">Volver</button>
        <button type="button" id="btn-refresh" class="primary">Actualizar</button>
      </div>
    </section>
    <div id="status" class="status"></div>
    <section id="list" class="list"></section>
  </main>

  <script>
    (function () {
      "use strict";

      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("list");
      const btnRefresh = document.getElementById("btn-refresh");
      const btnBack = document.getElementById("btn-back");
      const btnTheme = document.getElementById("btn-theme-toggle");
      const themeIcon = document.getElementById("theme-toggle-icon");

      function safeGetItem(key, fallback) {
        try {
          const value = localStorage.getItem(key);
          return value !== null ? value : fallback;
        } catch (_) {
          return fallback;
        }
      }

      function safeSetItem(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (_) {}
      }

      function applyTheme(theme) {
        const dark = theme === "dark";
        document.body.classList.toggle("theme-dark", dark);
        document.body.classList.toggle("theme-light", !dark);
        if (btnTheme) {
          btnTheme.setAttribute("aria-label", dark ? "Activar modo claro" : "Activar modo oscuro");
          btnTheme.setAttribute("title", dark ? "Cambiar a modo claro" : "Cambiar a modo oscuro");
        }
        if (themeIcon) themeIcon.textContent = dark ? "☾" : "☀";
        safeSetItem("agora-ui-theme", dark ? "dark" : "light");
      }

      function setStatus(text, isError) {
        statusEl.textContent = text || "";
        statusEl.classList.toggle("error", !!isError);
      }

      function formatDate(value) {
        if (!value) return "sin fecha";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "sin fecha";
        return d.toLocaleString("es-ES", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function escapeHtml(input) {
        const div = document.createElement("div");
        div.textContent = String(input == null ? "" : input);
        return div.innerHTML;
      }

      function renderItems(items) {
        const list = Array.isArray(items) ? items : [];
        if (!list.length) {
          listEl.innerHTML = '<article class="empty">Todavía no hay feedback registrado.</article>';
          return;
        }
        listEl.innerHTML = list
          .map((item) => {
            const text = escapeHtml(item.feedback_text || "");
            const username = escapeHtml(item.username || "usuario");
            const timestamp = escapeHtml(formatDate(item.created_at));
            return [
              '<article class="item">',
              '<p class="feedback-text">' + text + '</p>',
              '<p class="meta">' + username + ' · ' + timestamp + '</p>',
              '</article>',
            ].join("");
          })
          .join("");
      }

      async function loadFeedback() {
        setStatus("Cargando feedback...", false);
        btnRefresh.disabled = true;
        try {
          const res = await fetch("/admin/feedback/list?limit=2000", { credentials: "include" });
          if (res.status === 401) throw new Error("No autenticado.");
          if (res.status === 403) throw new Error("Solo admin puede ver esta página.");
          if (!res.ok) throw new Error("No se pudo cargar el feedback.");
          const data = await res.json();
          renderItems(data.items || []);
          setStatus("Mostrando " + (Array.isArray(data.items) ? data.items.length : 0) + " entradas.", false);
        } catch (err) {
          renderItems([]);
          setStatus(err && err.message ? err.message : "Error cargando feedback.", true);
        } finally {
          btnRefresh.disabled = false;
        }
      }

      btnRefresh.addEventListener("click", loadFeedback);
      btnTheme.addEventListener("click", function () {
        applyTheme(document.body.classList.contains("theme-dark") ? "light" : "dark");
      });
      btnBack.addEventListener("click", function () {
        window.location.assign("/ui/");
      });

      applyTheme(safeGetItem("agora-ui-theme", "light"));
      loadFeedback();
    })();
  </script>
</body>
</html>
