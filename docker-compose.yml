name: agora-local

services:
  postgres:
    image: postgres:16
    container_name: agora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agora}
      POSTGRES_USER: ${POSTGRES_USER:-agora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agora_pass}
    ports:
      - "5432:5432"
    volumes:
      - agora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agora_user} -d ${POSTGRES_DB:-agora}"]
      interval: 5s
      timeout: 3s
      retries: 20

  telemetry:
    build:
      context: .
      dockerfile: observability-platform/telemetry-service/Dockerfile
    restart: unless-stopped
    environment:
      AGORA_RUNTIME_CONTEXT: docker
      AGORA_DEPLOY_TARGET: ${AGORA_DEPLOY_TARGET:-local}
      POSTGRES_DB: ${POSTGRES_DB:-agora}
      POSTGRES_USER: ${POSTGRES_USER:-agora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agora_pass}
      TELEMETRY_DB_PATH: /data/telemetry.db
      TELEMETRY_INGEST_KEY: ${TELEMETRY_INGEST_KEY:-}
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - agora_telemetry_data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  agora_pg_data:
    driver: local
  agora_telemetry_data:
    driver: local
